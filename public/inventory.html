<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory — Shelf Guardian</title>
    <meta name="description" content="Manage and monitor your product inventory with Shelf Guardian.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        main { flex: 1; display: flex; flex-direction: column; }

        /* Header extras */
        .inv-header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        /* Toolbar (search + filters) */
        .inv-toolbar {
            background: rgba(255,255,255,.92);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: sticky;
            top: var(--header-h);
            z-index: 40;
        }

        /* Sort hint */
        .sort-hint {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 600;
            color: var(--txt-3);
            margin-left: auto;
        }

        /* List */
        #inventory-list {
            flex: 1;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Item card */
        .inv-item {
            background: var(--surface);
            border: 1px solid var(--border-str);
            border-radius: var(--r-md);
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: sgFadeUp .22s cubic-bezier(.33,1,.68,1) both;
        }

        .inv-item.danger  { border-left: 3px solid var(--danger);  }
        .inv-item.warning { border-left: 3px solid var(--warning); }

        .inv-item-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
        }

        .inv-item-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--txt-1);
            letter-spacing: -.01em;
            flex: 1;
            min-width: 0;
        }

        .inv-item-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .inv-meta-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            font-weight: 500;
            color: var(--txt-2);
        }

        .inv-item-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .inv-expiry {
            font-size: 12px;
            font-weight: 600;
            color: var(--txt-2);
        }

        .inv-qty {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            font-weight: 700;
            color: var(--txt-1);
            background: var(--surface-3);
            border: 1px solid var(--border-str);
            padding: 4px 10px;
            border-radius: var(--r-sm);
        }

        /* stat chips in header */
        .stat-dot {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        @media (max-width: 899px) {
            .dt-stats-row { display: none !important; }
        }

        @media (min-width: 600px) {
            .inv-toolbar, #inventory-list { max-width: 560px; margin-left: auto; margin-right: auto; width: 100%; }
        }
    </style>
</head>
<body>
<div class="page">

    <!-- Header -->
    <header class="sg-header">
        <div class="sg-header-inner">
            <div class="sg-header-badge">
                <i data-lucide="package-2" style="width:18px;height:18px;"></i>
            </div>
            <div class="sg-header-text">
                <div class="sg-header-title">Inventory</div>
                <div class="sg-header-sub" id="header-active-count">
                    <span class="stat-dot"></span>&ensp;0 active items
                </div>
            </div>
            <button id="refresh-btn" class="sg-header-action" aria-label="Refresh inventory">
                <i data-lucide="refresh-cw" style="width:17px;height:17px;"></i>
            </button>
        </div>
    </header>

    <div class="inv-toolbar">
        <div class="sg-search-wrap">
            <i data-lucide="search" class="sg-search-icon" style="width:17px;height:17px;"></i>
            <input type="search" id="search-input" class="sg-search" placeholder="Search inventory…" autocomplete="off">
        </div>
        <div style="display:flex; align-items:center; justify-content:space-between;">
            <div class="sg-filter-row" id="filter-tabs">
                <button data-status="active"  class="sg-filter-pill active">Active</button>
                <button data-status="all"     class="sg-filter-pill">All Items</button>
            </div>
            <div class="sort-hint">
                <i data-lucide="arrow-up-down" style="width:12px;height:12px;"></i>
                By expiry
            </div>
        </div>
    </div>

    <!-- Desktop Stats Row (Hidden on mobile) -->
    <div class="dt-stats-row" id="dt-stats">
        <div class="dt-stat-card">
            <div class="dt-stat-label">Total Items</div>
            <div class="dt-stat-value" id="stat-total">0</div>
            <div class="dt-stat-sub">Across all categories</div>
        </div>
        <div class="dt-stat-card accent">
            <div class="dt-stat-label">Active</div>
            <div class="dt-stat-value" id="stat-active">0</div>
            <div class="dt-stat-sub">Fresh and ready</div>
        </div>
        <div class="dt-stat-card warning">
            <div class="dt-stat-label">Expiring Soon</div>
            <div class="dt-stat-value" id="stat-soon">0</div>
            <div class="dt-stat-sub">Within 7 days</div>
        </div>
        <div class="dt-stat-card danger">
            <div class="dt-stat-label">Expired</div>
            <div class="dt-stat-value" id="stat-expired">0</div>
            <div class="dt-stat-sub">Needs attention</div>
        </div>
    </div>

    <main>
        <div id="inventory-list">
            <div class="sg-loading">
                <div class="sg-spinner"></div>
                <p>Loading inventory…</p>
            </div>
        </div>
    </main>
</div>

<div id="navbar-container"></div>
<script src="/js/layout.js"></script>
<script>
    const listEl      = document.getElementById('inventory-list');
    const countEl     = document.getElementById('header-active-count');
    const searchInput = document.getElementById('search-input');
    const filterTabs  = document.querySelectorAll('#filter-tabs button');
    const refreshBtn  = document.getElementById('refresh-btn');
    const dotEl       = countEl.querySelector('.stat-dot');

    let allItems = [];
    let currentFilter = 'active';

    document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
        fetchInventory();

        searchInput.addEventListener('input', renderList);

        filterTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                filterTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.status;
                renderList();
            });
        });

        refreshBtn.addEventListener('click', () => {
            const icon = refreshBtn.querySelector('svg');
            if (icon) icon.style.animation = 'sgSpin .7s linear infinite';
            fetchInventory().finally(() => setTimeout(() => {
                if (icon) icon.style.animation = '';
            }, 600));
        });
    });

    async function fetchInventory() {
        try {
            const res = await fetch('/api/inventory');
            allItems = await res.json();
            renderList();
        } catch (e) {
            listEl.innerHTML = `
                <div class="sg-empty">
                    <div class="sg-empty-icon"><i data-lucide="wifi-off" style="width:28px;height:28px;"></i></div>
                    <p class="sg-empty-title">Connection error</p>
                    <p class="sg-empty-text">Check your connection and tap refresh</p>
                </div>`;
            lucide.createIcons();
        }
    }

    function renderList() {
        const q = searchInput.value.toLowerCase().trim();
        let items = allItems.filter(item => {
            if (currentFilter === 'active' && new Date(item.expiry_date) < new Date()) return false;
            if (!q) return true;
            return item.name.toLowerCase().includes(q)
                || (item.brand    && item.brand.toLowerCase().includes(q))
                || (item.category && item.category.toLowerCase().includes(q));
        });
        items.sort((a, b) => new Date(a.expiry_date) - new Date(b.expiry_date));

        let activeCount = 0;
        let soonCount = 0;
        let expiredCount = 0;
        const totalCount = allItems.length;

        allItems.forEach(i => {
            const exp = new Date(i.expiry_date);
            exp.setHours(0,0,0,0);
            const t = new Date();
            t.setHours(0,0,0,0);
            const diff = Math.floor((exp - t) / 86400000);
            
            if (diff < 0) {
                expiredCount++;
            } else if (diff <= 7) {
                soonCount++;
                activeCount++;
            } else {
                activeCount++;
            }
        });

        countEl.innerHTML = `<span class="stat-dot"></span>&ensp;${activeCount} active item${activeCount !== 1 ? 's' : ''}`;
        
        document.getElementById('stat-total').textContent = totalCount;
        document.getElementById('stat-active').textContent = activeCount;
        document.getElementById('stat-soon').textContent = soonCount;
        document.getElementById('stat-expired').textContent = expiredCount;

        if (items.length === 0) {
            const msg = q
                ? `No results for "${q}"`
                : currentFilter === 'active' ? 'No active items' : 'Inventory is empty';
            listEl.innerHTML = `
                <div class="sg-empty">
                    <div class="sg-empty-icon"><i data-lucide="package-search" style="width:28px;height:28px;"></i></div>
                    <p class="sg-empty-title">${msg}</p>
                    <p class="sg-empty-text">Scan products to build your inventory</p>
                </div>`;
        } else {
            listEl.innerHTML = items.map(renderItem).join('');
        }
        lucide.createIcons();
    }

    function renderItem(item) {
        const expiry = new Date(item.expiry_date);
        const today  = new Date();
        expiry.setHours(0,0,0,0); today.setHours(0,0,0,0);
        const days = Math.floor((expiry - today) / 86400000);

        let badge = '', cls = '';
        if (days < 0) {
            badge = `<span class="sg-badge sg-badge-danger"><i data-lucide="x-circle" style="width:10px;height:10px;"></i>Expired</span>`;
            cls = 'danger';
        } else if (days <= 3) {
            badge = `<span class="sg-badge sg-badge-danger"><i data-lucide="alert-triangle" style="width:10px;height:10px;"></i>${days}d left</span>`;
            cls = 'danger';
        } else if (days <= 7) {
            badge = `<span class="sg-badge sg-badge-warning"><i data-lucide="clock" style="width:10px;height:10px;"></i>${days}d left</span>`;
            cls = 'warning';
        } else if (days <= 14) {
            badge = `<span class="sg-badge sg-badge-info">${days} days</span>`;
        } else {
            badge = `<span class="sg-badge sg-badge-success"><i data-lucide="check-circle-2" style="width:10px;height:10px;"></i>Fresh</span>`;
        }

        const dateStr = expiry.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });

        return `
        <div class="inv-item ${cls}">
            <div class="inv-item-top">
                <div class="inv-item-name truncate">${item.name}</div>
                ${badge}
            </div>
            ${(item.brand || item.category) ? `
            <div class="inv-item-meta">
                ${item.brand    ? `<span class="inv-meta-chip"><i data-lucide="tag"    style="width:12px;height:12px;color:var(--txt-3);"></i>${item.brand}</span>` : ''}
                ${item.category ? `<span class="inv-meta-chip"><i data-lucide="folder" style="width:12px;height:12px;color:var(--txt-3);"></i>${item.category}</span>` : ''}
            </div>` : ''}
            <div class="inv-item-bottom">
                <span class="inv-expiry">Expires ${dateStr}</span>
                <span class="inv-qty"><i data-lucide="package" style="width:12px;height:12px;color:var(--txt-3);"></i>${item.quantity}</span>
            </div>
        </div>`;
    }
</script>
</body>
</html>
