<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Shelf Guardian</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-side-image">
            <h2>Shelf Guardian</h2>
            <p>Shelf Guardian helps you minimize waste and maximize freshness with real-time expiry tracking.</p>
            <div class="auth-features">
                <div class="auth-feat-item"><i data-lucide="zap"></i> Instant Barcode Scanning</div>
                <div class="auth-feat-item"><i data-lucide="bell"></i> Smart Expiry Notifications</div>
                <div class="auth-feat-item"><i data-lucide="layout-grid"></i> Inventory Analytics</div>
            </div>
        </div>
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-icon">
                    <i data-lucide="shield-check"></i>
                </div>
                <h1>Welcome Back</h1>
                <p>Sign in to manage your shelf</p>
            </div>
            
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <i data-lucide="user"></i>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock"></i>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>
                
                <div id="error-msg" class="error-banner" style="display: none;"></div>
                
                <button type="submit" class="auth-btn">
                    <span>Sign In</span>
                    <i data-lucide="arrow-right"></i>
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Create one</a></p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');
        
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            
            const username = loginForm.username.value;
            const password = loginForm.password.value;
            
            const btn = loginForm.querySelector('.auth-btn');
            const btnText = btn.querySelector('span');
            const originalText = btnText.textContent;
            
            btn.disabled = true;
            btnText.textContent = 'Signing in...';
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    window.location.href = '/inventory.html';
                } else {
                    errorMsg.textContent = data.error || 'Login failed';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Please try again.';
                errorMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                btnText.textContent = originalText;
            }
        });
    </script>
</body>
</html>
